must_address_items:
- description: A young DTC brand (~7 months past launch, E1/E2) faces a national
    retail/wholesale expansion that is a high-commitment, low-reversibility move; the
    live question is how broad/aggressive, not whether retail exists as a path (E3).
  evidence_unit_ids:
  - E1
  - E2
  - E3
  must_address_item_id: MA-01
- description: Moving DTC -> wholesale/retail raises real operational demands (inventory,
    supply chain, demand planning, vendor terms) and is a recognized commitment/
    execution-risk growth lever for an early-stage brand (E4).
  evidence_unit_ids:
  - E4
  must_address_item_id: MA-02
- description: There is no pre-cutoff measurement of Topicals' OWN operational readiness
    (inventory depth, supply-chain capacity, demand planning) to support a wholesale
    expansion in this packet beyond the single org-motion role signal.
  evidence_unit_ids:
  - E2
  - E4
  must_address_item_id: MA-03
- description: Comparable DTC -> retail expansions (E5) are a base-rate proxy only; their
    outcomes are excluded, so they cannot substitute for direct evidence of Topicals'
    specific readiness or timing.
  evidence_unit_ids:
  - E5
  must_address_item_id: MA-04
- description: The augmented-arm org-motion signal (E6) is a single pre-cutoff careers
    snapshot, one open supply-chain/operations role -- gross hiring INTENT in one
    function, not a realized hire, not net headcount adds, and not a multi-month
    trajectory; its thinness must travel with any inference drawn from it.
  evidence_unit_ids:
  - E6
  must_address_item_id: MA-05
