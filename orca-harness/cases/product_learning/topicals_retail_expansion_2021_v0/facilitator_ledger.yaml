    The decide-vs-confirm axis here is under-reach (floor), not over-reach. The packet
    frames a young-brand expansion window (E3) with comparable DTC -> retail moves
    available across the market (E5); failing to act on an available growth window is the
    observable underreach error, balanced against the genuine commitment/execution cost
