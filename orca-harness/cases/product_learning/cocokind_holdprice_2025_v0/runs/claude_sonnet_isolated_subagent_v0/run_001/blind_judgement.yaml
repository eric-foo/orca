contestant_band_claim:
  advisory_only: true
  claimed_ceiling: 5
  claimed_floor: 2
  reasoning: 'Floor is 2 (minimal conservative action — hold all prices, absorb fully)
    because the packet provides no evidence that margin pressure has already become
    acute; price stability over a year could reflect deliberate hold or healthy margin.
    Ceiling is 5 (strong committed action — broad catalog increase with stated rationale)
    because the tariff pressure is stipulated as real and non-trivial, and a founder
    with full authority could reasonably act decisively. The band does not extend
    to 7–8 because no evidence in the packet supports aggressive or escalatory action;
    the cost structure gap (MA-03) actively suppresses confidence above 5. Escalation
    (6) is not warranted because the evidence is sparse but not conflicting.

    '
