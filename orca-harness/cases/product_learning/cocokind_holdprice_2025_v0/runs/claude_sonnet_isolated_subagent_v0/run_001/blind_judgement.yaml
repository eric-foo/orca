recommended_action:
  action_label: Selective SKU-level price increase, modest magnitude, with positioning
    anchor held
  ladder_level: 3
  rationale: 'The evidence shows a stable, sub-$30 price architecture across hero
    SKUs (E6–E10) and bestsellers (E4, E5), with no observed price movement across
    the ~one-year homepage window (E1–E3). This stability is itself a brand signal:
    cocokind has not used price increases as a visible lever even as tariff pressure
    built through 2024–2025. The affordable clean beauty positioning (MA-01) creates
    a real ceiling trap — aggressive broad increases risk brand-level damage that
    is harder to recover than margin. However, absorbing all tariff cost with zero
    adjustment is unsupported by the evidence as sustainable, and the absence of cost
    or margin data (MA-03) means the margin floor is unknown. The correct move under
    this uncertainty is selective adjustment on SKUs where the price-to-positioning
    gap is widest (non-entry price points, hero serums) while holding or protecting
    entry-level SKUs that anchor accessibility. Confidence is deliberately moderated
    to level 3 because the missing cost structure data is the single largest gap —
    without it, neither the magnitude of necessary increase nor the margin headroom
    is observable from the packet alone.

    '
