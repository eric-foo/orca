recommended_action:
  action_label: Stay UV-focused; test broader skin-health options without renaming
  ladder_level: 3
  rationale: From the packet alone, the homepage evidence shows the brand remained
    anchored to UV-protection across April-September 2018, including the cutoff-proximate
    snapshot, so a full rename would discard the clearest existing equity without
    evidence that the niche has failed. The FAQ evidence also implies the UV claim
    architecture requires careful scoping and qualification, which is a real positioning
    risk, but that risk argues for tighter claims discipline before it argues for
    a broad platform pivot. The packet lacks sales, conversion, retention, consumer
    research, competitive, or regulatory outcome evidence, so a committed repositioning
    would be under-supported. The best move is to keep the Sundots UV-specific line
    as the core while running low-lock-in tests of broader skin-health messaging or
    adjacent products.
