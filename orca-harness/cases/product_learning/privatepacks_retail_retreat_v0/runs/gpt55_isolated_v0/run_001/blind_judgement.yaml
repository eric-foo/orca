recommended_action:
  action_label: Hold footprint; freeze expansion
  ladder_level: 3
  rationale: Do not exit or materially scale back CVS and Target on this packet alone,
    because the evidence lacks direct sell-through, reorder, buyer feedback, or store-level
    velocity data. The active store-locator and wholesale/retail-partner pages indicate
    retail was still an active, publicly presented channel near the cutoff, so a hard
    retreat would outrun the observed evidence. The stronger move is to stop incremental
    retail growth, protect DTC focus, and use the current planogram window to demand
    partner-level performance data before any exit or expansion decision.
