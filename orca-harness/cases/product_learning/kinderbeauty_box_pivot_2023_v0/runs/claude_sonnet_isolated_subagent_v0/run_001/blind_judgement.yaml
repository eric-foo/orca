  - MA-03
load_bearing_assumption:
  statement: >-
    The $16 first-box acquisition price is meaningfully below the recurring subscription
    price (i.e., it is a genuine loss-leader discount, not simply the standard subscription
    price), and the recurring subscription price is not itself already at or near a low
    accessible entry point. If the recurring subscription were already priced near $16 or
    the first-box offer represented standard pricing, the load-bearing signal in E7 would
    not exist and the recommendation would collapse toward level 2 (no change) or level 1 (wait).
  evidence_unit_ids: [E7, E5]
  would_flip_if_false: true
