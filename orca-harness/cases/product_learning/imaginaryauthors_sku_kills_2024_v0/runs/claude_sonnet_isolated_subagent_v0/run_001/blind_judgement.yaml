load_bearing_assumption:
  statement: >
    The absence of any public discontinuation signal, stock-out marker, or pricing
    distress in the pre-cutoff snapshots means both SKUs were carrying as normal
    live catalog items at the time of the decision, and this absence of distress
    is sufficient to make aggressive discontinuation unjustifiable on the available
    evidence. If either SKU had shown a stock-out or removal from the collections/all
    page in the evidence window, the recommendation would shift toward a staged exit
    (level 4 or 5) for that SKU.
  evidence_unit_ids: [E3, E4, E5]
  would_flip_if_false: true
