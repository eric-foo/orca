contestant_band_claim:
  advisory_only: true
  claimed_ceiling: 4
  claimed_floor: 2
  reasoning: 'The floor is 2 (minimal action — hold or $1 increase on a single SKU)
    because the evidence supports at least some price movement: the premium-clean
    positioning is intact, no homepage distress signals suggest consumer fragility,
    and tariff pressure on US beauty supply chains is treated as real and non-trivial
    per the packet''s permitted assumptions. The ceiling is 4 (committed selective
    repricing, $1–3 range across targeted SKUs) because the cost-gap evidence is absent
    — no COGS data means a full $4 across-the-board increase is not supportable from
    this packet alone, and stronger action (7–8) would require confirmed margin data
    that does not appear here. Escalation (6) is unwarranted because the evidence
    is thin but not conflicted.

    '
