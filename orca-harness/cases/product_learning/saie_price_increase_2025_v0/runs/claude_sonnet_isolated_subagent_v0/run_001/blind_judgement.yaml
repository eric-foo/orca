recommended_action:
  action_label: Raise prices selectively by $1–2 on lower-end SKUs; hold on higher-priced
    products
  ladder_level: 3
  rationale: 'The evidence (E4, E5, E6–E10) shows Saie''s DTC catalog clusters in
    the $22–$36 range, with individual PDPs displaying clean, value-laden copy and
    sustainability badging that supports modest price increases as consistent with
    a premium-clean brand narrative rather than contradicting it. A $1–2 increase
    on products currently priced at the lower end of that band ($22–$26) maintains
    tier coherence and is less likely to trigger perceived brand dilution than a flat
    $3–4 increase across the full catalog. Because no internal cost data exists in
    this packet, the recommendation is deliberately conservative — enough to partially
    offset documented tariff pressure on beauty supply chains without over-indexing
    on a cost burden that cannot be quantified from public evidence alone. Homepage
    messaging (E1–E3) shows no explicit cost-pressure signals or pre-emptive repositioning
    language, so the brand has not yet publicly anchored a narrative that would make
    a large price move feel abrupt to consumers.

    '
