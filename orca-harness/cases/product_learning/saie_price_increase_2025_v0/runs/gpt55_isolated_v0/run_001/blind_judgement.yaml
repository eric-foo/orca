recommended_action:
  action_label: selective conservative repricing
  ladder_level: 3
  rationale: 'Do not apply a blanket $1-4 increase across all DTC products. The packet
    supports that Saie sits in an accessible premium-clean band, so modest increases
    are not inherently contradictory to positioning, but the absence of COGS, margin,
    tariff exposure, and price-sensitivity data makes broad repricing under-supported.
    Use a selective approach: raise only SKUs where price architecture remains coherent
    and tariff exposure is most plausibly material, while preserving entry/hero price
    points and tightening promotions or bundles to protect margin.'
