contestant_band_claim:
  advisory_only: true
  claimed_ceiling: 4
  claimed_floor: 3
  reasoning: The defensible range is narrow phase-in to moderate structured migration.
    Level 3 is supported because gating a small power-user slice preserves lower-tier
    access while testing resistance. Level 4 is stronger because Rules and active
    searches were already tiered, so a structured migration with grandfathering is
    consistent with existing positioning. Levels 5, 7, and 8 overreach because they
    treat accepted willingness to pay as proof that users will accept aggressive gating
    of an expected feature.
