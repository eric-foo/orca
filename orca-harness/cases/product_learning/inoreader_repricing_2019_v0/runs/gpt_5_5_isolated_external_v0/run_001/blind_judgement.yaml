recommended_action:
  action_label: moderate structured tier migration
  ladder_level: 4
  rationale: Rules are already positioned as a paid power-user feature, so some tiering
    is justified and industry-normal. But aggressive gating would directly affect
    the users most attached to the feature, and the packet shows a known backlash
    pattern when RSS products gate expected functionality. Because there is no pre-cutoff
    measurement of Inoreader users' tolerance for tightening Rules specifically, the
    best action is broader packaging cleanup with migration protection, not an immediate
    hard gate.
