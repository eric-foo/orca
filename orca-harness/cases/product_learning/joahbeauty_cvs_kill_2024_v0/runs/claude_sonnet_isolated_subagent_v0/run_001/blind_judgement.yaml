load_bearing_assumption:
  statement: >-
    The LA pop-up event (E7) and active DTC investment signals (E8, E11) represent genuine
    strategic channel diversification intent rather than supplemental marketing activity
    fully compatible with continued CVS expansion. If these are merely brand-building
    activations that run alongside an otherwise healthy and prioritized CVS channel,
    the floor drops to level 3 (continue CVS with reduced SKU / renegotiated terms)
    or even level 2 (continue as-is), and the recommendation to pause new CVS investment
    is unsupported by this evidence alone.
  evidence_unit_ids: [E7, E8, E11]
  would_flip_if_false: true
