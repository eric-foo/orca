  action_label: Maintain CVS, pause expansion
  ladder_level: 2
  rationale: 'The packet does not contain CVS sell-through, velocity, reorder, markdown,
    or door-level data, so a channel-exit recommendation would rest on an unsupported
    inference. The DTC-side evidence instead points to an active brand near the cutoff:
    repeated homepage snapshots, a live brand-story page, catalog and collection pages,
    bundles, affiliate acquisition, blog/news presence, and an LA pop-up. The LA pop-up
    suggests Joah was investing experiential retail energy outside CVS, but that supports
    channel diversification more than killing the CVS footprint. The best bounded
    action is to maintain the CVS commitment while pausing expansion and using the
    next decision gate to obtain retail performance data before any wind-down.'
