recommended_action:
  action_label: Prioritize DTC subscription deepening while holding the product range
    at current breadth — selective tightening, not expansion
  ladder_level: 4
  rationale: 'The evidence shows a subscription mechanic already live and promoted
    since at least early 2019, a functional personalization entry point (consultation
    survey), and a referral program added by December 2019 — the infrastructure for
    a flywheel is in place but the economics of that flywheel are entirely unobservable.
    Given that unobservability, the correct posture is to invest in learning: deepen
    retention and plan-attachment signals on the owned channel before committing capital
    to channel diversification or geographic expansion, which both require external
    negotiations outside unilateral control. The catalog reached 15+ SKUs across 6
    concern categories by November 2019 and extended into fragrance, signaling genuine
    breadth risk — each new category adds operational complexity against an unknown
    team depth. The strongest evidence of product-market traction is concentrated
    in gut-health and prebiotic SKUs (best-sellers page E5), suggesting the brand''s
    authority is narrower than its catalog, and that focus protection matters more
    than further range extension right now. A moderate-active recommendation (4) rather
    than strong-committed (5+) is warranted because the absence of unit economics
    means the depth of the subscription opportunity is unverifiable and the band ceiling
    is capped by irreducible uncertainty.

    '
