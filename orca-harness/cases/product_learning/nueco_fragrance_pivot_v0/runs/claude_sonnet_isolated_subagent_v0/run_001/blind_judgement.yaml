  reasoning: 'Floor is 3 (selective consolidation and subscription investment) rather
    than 1 or 2 because the infrastructure for deepening is already live, the consultation
    survey and plan UX exist, and the referral program signals intent to grow organically
    — waiting for more data is not free when the flywheel is already partially built.
    Ceiling is 5 rather than 7-8 because no unit economics are visible: subscriber
    count, churn, LTV, and CAC are all unobservable, so a strong all-in subscription
    commitment could misallocate capital if the cohort economics are poor. Channel
    and geography expansion (ladder 6+) would require external negotiations outside
    unilateral authority and introduce complexity the evidence does not support justifying.

    '
