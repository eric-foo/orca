recommended_action:
  action_label: Deepen DTC plans, constrain expansion
  ladder_level: 4
  rationale: Prioritise improving the owned DTC subscription and personalization experience,
    but do it as a focused 2020 operating priority rather than a heavy all-in bet.
    The site already has ReCharge subscriptions, a 20% recurring discount, plan/cart
    UX, a survey-based recommendation flow, reviews, referral, email, retargeting,
    affiliate, and bestseller signals; those are enough to justify active optimization.
    Confidence is capped because no subscriber count, churn, retention, LTV, CAC,
    plan attachment, or subscription margin is observable, so any claim about durable
    recurring economics would be unsupported. Product/category expansion should be
    slowed to selective bets around proven categories, because the late-2019 catalog
    already spans many concerns and formats, creating dilution and operational-complexity
    risk. Channel or geography expansion should remain small-test/opportunistic, since
    the NYC Flagship, England lab, USD checkout, and UK-origin barcode signal possible
    cross-channel/cross-geography activity but not enough evidence to redirect core
    capital there.
