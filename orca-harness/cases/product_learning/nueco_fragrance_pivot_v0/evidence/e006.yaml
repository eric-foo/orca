summary: >
  The February 2019 About page presents the brand origin story (founded 2017, rooted
  in a grandfather-scientist narrative) and a four-stage product philosophy (proven
  formula → remove synthetic chemicals → substitute organic food ingredients → natural
  supplement backed by science); it identifies ingredient sourcing choices (Camu Camu
  for Vitamin C, Baobab for Beta-Carotene, Beetroot for Iron), manufacturing in a
  20-year-old English lab in FDA-approved facilities, recyclable glass packaging, a
  "zero waste by 2020" sustainability commitment, a footer reference to an "NYC Flagship"
  location, and subscription-benefit language grouped as Delivered / Results / Support.
