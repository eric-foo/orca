  reasoning: 'Floor 2: the evidence clearly supports some restructuring given industry
    norms and FeedHaven''s own positioning; 0-1 ignores the monetization signal in
    E2/E4/E5. Ceiling 4 (structured migration with grandfathering) is defensible only
    with strong evidence users have internalized a clear Flows tier boundary, which
