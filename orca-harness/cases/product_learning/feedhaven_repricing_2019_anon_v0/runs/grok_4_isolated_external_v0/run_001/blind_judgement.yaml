recommended_action:
  action_label: moderate, structured tier migration
  ladder_level: 4
  rationale: E2 shows Flows and searches already concentrated in upper tiers with
    a generous low end, establishing precedent for gating without full free access.
    E1 reinforces Flows as the paid power-user differentiator. However, E3 and E4
    document clear base-rate backlash to paywalling expected RSS features, while E5
    shows tolerance only within a willingness-to-pay band. Aggressive gating (7-8)
    risks hitting exactly the core users who rely on Flows (MA-01) with no FeedHaven-specific
    tolerance data (MA-04). Moderate migration with grandfathering balances industry-normal
    gating (MA-03) against the backlash threshold (MA-05) while remaining reversible.
