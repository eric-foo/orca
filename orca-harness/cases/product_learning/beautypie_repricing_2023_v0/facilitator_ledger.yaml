must_address_items:
- description: The £5/mo tier is the lowest-commitment on-ramp into the membership model
    (E1, E2); eliminating it and moving those members to £10/mo doubles the price for
    exactly the most price-sensitive, lowest-commitment segment.
  evidence_unit_ids:
  - E1
  - E2
  must_address_item_id: MA-01
- description: UK cost-of-living pressure in early 2023 (E3) raises the retention risk
    of a price increase on discretionary beauty spend.
  evidence_unit_ids:
  - E3
  must_address_item_id: MA-02
- description: Eliminating an entry tier / raising the floor price is a recognized
    retention-risk repricing lever (E4); the live question is how aggressive, not
    whether to touch pricing at all.
  evidence_unit_ids:
  - E4
  must_address_item_id: MA-03
- description: There is no pre-cutoff measurement of Beauty Pie's own members' tolerance
    for the doubling or for scrapping the monthly spending limits.
  evidence_unit_ids:
  - E2
  must_address_item_id: MA-04
- description: Comparable consumer-subscription repricings (E5) are a base-rate proxy
    only; their outcomes are excluded, so they cannot substitute for direct evidence
    of Beauty Pie member tolerance.
  evidence_unit_ids:
  - E5
  - E3
  must_address_item_id: MA-05
paired_packet_design:
  arms:
  - participant_packet_baseline.md
  - participant_packet_augmented.md
  measures: >-
    Sensitivity of the blind judgement (recommended action band) to the org-motion
    block, holding all else byte-identical. The constructor asserts no direction of
    effect.
  only_delta: >-
    The two participant packets are byte-identical except for a single inserted
    "Organizational Motion Signal" section (public Greenhouse hiring intent, snapshot
    <= 2023-01-31) present only in participant_packet_augmented.md.
  org_motion_is_must_address: false
  org_motion_signal_class: hiring_intent_gross_base_rate_discounted_not_net_adds
