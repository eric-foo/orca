name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  orca-harness-tests:
    name: orca-harness-tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: orca-harness
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install orca-harness (core) + pytest
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . "pytest==9.0.3"
      - name: Run tests
        run: python -m pytest
      - name: retrieval link check
        working-directory: ${{ github.workspace }}
        run: python .agents/hooks/check_map_links.py --strict
